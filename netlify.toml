# Configuration Netlify pour Parole Vivante (NT) Web PWA

# Spécification du répertoire de build si Netlify build lui-même (facultatif si build local)
[build]
  publish = "app/build/web"
  command = "cd app && flutter build web --release --dart-define=LICENSE_OK=false"

# Redirection pour Single Page Application (SPA)
# Essentiel pour que les routes Flutter fonctionnent après un rafraîchissement
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# En-têtes de sécurité et de cache
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache agressif pour les assets immuables (Flutter web utilise des hash)
[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
