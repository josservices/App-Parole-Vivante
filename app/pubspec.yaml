name: parole_vivante_nt

description: Application biblique offline privée - Parole Vivante NT.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  sqflite_common_ffi: ^2.4.0+2
  share_plus: ^10.1.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/bible.parolevivante.nt.json
    - assets/bible.db
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  linux: true
  web:
    generate: true
    image_path: "assets/branding/app_icon_1024.png"
    background_color: "#0B1220"
    theme_color: "#1B8A5A"
  image_path: "assets/branding/app_icon_1024.png"
  adaptive_icon_background: "#0B1220"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground_1024.png"
